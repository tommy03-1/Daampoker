<hr>

<h2>🎮 Poker Lobby</h2>

<input id="playerName" placeholder="Нэрээ оруул">
<button onclick="enterLobby()">Орох</button>

<div id="lobbyBox"></div>

<script>
function enterLobby(){
 let name = document.getElementById("playerName").value;

 if(name!=""){
 document.getElementById("lobbyBox").innerHTML =
 `
 <h3>Сайн байна уу, ${name}</h3>
 <button onclick="createRoom()">+ Өрөө үүсгэх</button>
 <div id="rooms"></div>
 `;
 }
}

function createRoom(){
 document.getElementById("rooms").innerHTML +=
 `
 <div>
 🃏 Poker Room - 0/9
 <button>Орох</button>
 </div>
 `;
}
</script>
