<!DOCTYPE html>
<html>
<head>
<title>Poker Game</title>
<style>
body{
  text-align:center;
  font-family:Arial;
  background:#1b5e20;
  color:white;
}

.card{
  display:inline-block;
  background:white;
  color:black;
  padding:20px;
  margin:10px;
  font-size:30px;
  border-radius:10px;
}

button{
  padding:12px 25px;
  font-size:18px;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>🃏 2 Player Poker</h1>

<h2>Тоглогч 1</h2>
<div id="player1"></div>

<h2>Тоглогч 2</h2>
<div id="player2"></div>

<button onclick="deal()">Карт тараах</button>

<script>
let cards=[
"♠A","♠K","♠Q","♥A","♥K","♥Q",
"♦A","♦K","♦Q","♣A","♣K","♣Q"
];

function deal(){
 let a=Math.floor(Math.random()*cards.length);
 let b=Math.floor(Math.random()*cards.length);

 while(a==b){
  b=Math.floor(Math.random()*cards.length);
 }

 document.getElementById("player1").innerHTML=
 "<div class='card'>"+cards[a]+"</div>";

 document.getElementById("player2").innerHTML=
 "<div class='card'>"+cards[b]+"</div>";
}
</script>

</body>
</html>
