<!DOCTYPE html>
<html>
<head>
<title>Online Poker Room</title>
<style>
body{
 text-align:center;
 font-family:Arial;
 background:#14532d;
 color:white;
}
input,button{
 padding:12px;
 margin:8px;
 font-size:18px;
}
</style>
</head>

<body>

<h1>🃏 Online Poker</h1>

<h2>Өрөө үүсгэх</h2>
<button onclick="createRoom()">Room үүсгэх</button>

<h2>Өрөөнд орох</h2>
<input id="room" placeholder="Room код">
<button onclick="joinRoom()">Орох</button>

<h3 id="result"></h3>

<script>
function createRoom(){
 let code=Math.floor(1000+Math.random()*9000);
 document.getElementById("result").innerHTML=
 "Таны өрөөний код: "+code;
}

function joinRoom(){
 let code=document.getElementById("room").value;
 document.getElementById("result").innerHTML=
 "Room "+code+" руу орлоо!";
}
</script>

</body>
</html>
