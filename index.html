<!DOCTYPE html>
<html>
<head>
<title>9 Player Texas Holdem</title>
<style>
body{
  background:#075e32;
  color:white;
  text-align:center;
  font-family:Arial;
}
.player{
  display:inline-block;
  background:#064;
  padding:15px;
  margin:5px;
  border-radius:10px;
}
.card{
  display:inline-block;
  background:white;
  color:black;
  padding:15px;
  margin:5px;
  border-radius:8px;
  font-size:25px;
}
button{
  padding:12px 25px;
  font-size:18px;
}
</style>
</head>

<body>

<h1>🃏 Texas Hold'em</h1>

<div id="table"></div>

<h2>Ширээний карт</h2>
<div id="board"></div>

<button onclick="deal()">Карт тараах</button>

<script>

let deck=[
"♠A","♠K","♠Q","♠J","♠10",
"♥A","♥K","♥Q","♥J","♥10",
"♦A","♦K","♦Q","♦J","♦10",
"♣A","♣K","♣Q","♣J","♣10"
];

function randomCard(){
 let i=Math.floor(Math.random()*deck.length);
 return deck.splice(i,1)[0];
}

function deal(){

document.getElementById("table").innerHTML="";

for(let i=1;i<=9;i++){

let c1=randomCard();
let c2=randomCard();

document.getElementById("table").innerHTML +=
`
<div class="player">
Тоглогч ${i}<br>
<span class="card">${c1}</span>
<span class="card">${c2}</span>
</div>
`;
}

document.getElementById("board").innerHTML=
`
<span class="card">${randomCard()}</span>
<span class="card">${randomCard()}</span>
<span class="card">${randomCard()}</span>
<span class="card">${randomCard()}</span>
<span class="card">${randomCard()}</span>
`;

}

</script>

</body>
</html>
